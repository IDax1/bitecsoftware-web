<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil - Bitec Software</title>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; padding: 40px; }
        .container { background: #1e293b; max-width: 500px; margin: auto; padding: 20px; border-radius: 12px; }
        h1 { color: #38bdf8; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        p { font-size: 1.1rem; line-height: 1.6; }
        span { color: #38bdf8; font-weight: bold; }
        button { margin-top: 20px; padding: 10px 20px; background: #ef4444; border: none; color: white; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Panel de Usuario</h1>
        <p>Correo actual: <span id="userEmail">Cargando...</span></p>
        <p>ID de Usuario: <span id="userId">...</span></p>
        <p>Fecha de creación: <span id="userDate">...</span></p>
        <button id="btnSalir">Cerrar Sesión</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBkkeUy3lWFwRCZp-2gfoEBu5UP2R2vsZk",
            authDomain: "bitecsoftware-web.firebaseapp.com",
            projectId: "bitecsoftware-web",
            storageBucket: "bitecsoftware-web.firebasestorage.app",
            messagingSenderId: "573214894891",
            appId: "1:573214894891:web:646628d1e8eb15478bf36e",
            measurementId: "G-2EW80575TR"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Detectar si el usuario está logeado
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('userEmail').innerText = user.email;
                document.getElementById('userId').innerText = user.uid;
                document.getElementById('userDate').innerText = user.metadata.creationTime;
            } else {
                // Si no hay usuario, redirigir al login
                window.location.href = "login.html";
            }
        });

        // Botón salir
        document.getElementById('btnSalir').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = "login.html");
        });
    </script>
</body>
</html>
