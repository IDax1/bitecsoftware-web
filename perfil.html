<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Usuario - Bitec Software</title>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #1e293b; width: 400px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #334155; }
        h1 { color: #38bdf8; font-size: 1.5rem; border-bottom: 1px solid #334155; padding-bottom: 10px; margin-bottom: 20px; }
        p { margin: 10px 0; color: #94a3b8; }
        span { color: #38bdf8; font-weight: bold; }
        .rango-badge { background: #38bdf8; color: #0f172a; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; text-transform: uppercase; }
        .btn-logout { width: 100%; margin-top: 20px; padding: 10px; background: #ef4444; border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-admin { width: 100%; margin-top: 10px; padding: 10px; background: #22c55e; border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mi Perfil Bitec</h1>
        <p>Email: <span id="userEmail">...</span></p>
        <p>Rango: <span id="userRango" class="rango-badge">Cargando...</span></p>
        <p>Registrado el: <span id="userDate">...</span></p>
        
        <button id="btnAdmin" class="btn-admin">PANEL DE ADMINISTRADOR</button>
        
        <button id="btnSalir" class="btn-logout">CERRAR SESIÓN</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        // Importamos Firestore para leer el rango
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBkkeUy3lWFwRCZp-2gfoEBu5UP2R2vsZk",
            authDomain: "bitecsoftware-web.firebaseapp.com",
            projectId: "bitecsoftware-web",
            storageBucket: "bitecsoftware-web.firebasestorage.app",
            messagingSenderId: "573214894891",
            appId: "1:573214894891:web:646628d1e8eb15478bf36e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // 1. Mostrar el email que viene del Login
                document.getElementById('userEmail').innerText = user.email;

                // 2. Ir a buscar el Rango a Firestore usando el UID del usuario
                const docRef = doc(db, "usuarios", user.uid);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const datos = docSnap.data();
                    document.getElementById('userRango').innerText = datos.rango;
                    document.getElementById('userDate').innerText = datos.fechaRegistro;

                    // 3. Si es admin, mostramos el botón secreto
                    if (datos.rango === "admin") {
                        document.getElementById('btnAdmin').style.display = "block";
                    }
                }
            } else {
                window.location.href = "login.html";
            }
        });

        // Cerrar sesión
        document.getElementById('btnSalir').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = "login.html");
        });
    </
