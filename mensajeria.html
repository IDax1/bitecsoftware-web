<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensajería y Soporte - Bitec</title>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --border: #334155; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Contenedor Principal */
        .main-container { display: flex; width: 100%; }

        /* Sección de Chat (Izquierda) */
        .chat-section { flex: 2; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        .chat-header { padding: 20px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: #0b1120; }
        
        /* Burbujas de Chat */
        .msg { padding: 10px 15px; border-radius: 12px; max-width: 75%; font-size: 0.9rem; line-height: 1.4; }
        .msg-other { background: var(--card); align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg-me { background: var(--primary); color: var(--bg); align-self: flex-end; border-bottom-right-radius: 2px; font-weight: 500; }
        .u-name { font-size: 0.7rem; display: block; margin-bottom: 3px; opacity: 0.7; font-weight: bold; }

        /* Sección de Tickets (Derecha) */
        .ticket-section { flex: 1; background: var(--card); padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .ticket-form { background: var(--bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        
        /* Inputs y Botones */
        .input-area { padding: 20px; background: var(--card); display: flex; gap: 10px; border-top: 1px solid var(--border); }
        input, textarea { width: 100%; background: #0f172a; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; outline: none; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--primary); }
        button { background: var(--primary); color: var(--bg); border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { filter: brightness(1.1); }
        .btn-volver { background: #475569; color: white; text-decoration: none; padding: 8px 15px; border-radius: 6px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="chat-section">
            <div class="chat-header">
                <h2 style="margin:0; color:var(--primary);">Comunidad Bitec</h2>
                <a href="index.html" class="btn-volver">Inicio</a>
            </div>
            
            <div id="chat-box">
                </div>

            <div class="input-area">
                <input type="text" id="txtMensaje" placeholder="Escribe un mensaje a la comunidad...">
                <button id="btnEnviar">Enviar</button>
            </div>
        </div>

        <div class="ticket-section">
            <h2 style="margin:0; color:var(--primary);">Soporte Técnico</h2>
            <p style="color:#94a3b8; font-size:0.9rem;">¿Tienes problemas con un mod o software? Abre un ticket privado.</p>
            
            <div class="ticket-form">
                <label style="font-size: 0.8rem; font-weight: bold; color: #38bdf8;">DESCRIPCIÓN DEL PROBLEMA</label>
                <textarea id="ticketMsg" rows="6" style="margin-top:10px;" placeholder="Detalla tu consulta aquí..."></textarea>
                <button id="btnTicket" style="width:100%; margin-top:15px; background: #22c55e; color: white;">ENVIAR TICKET</button>
            </div>

            <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border);">
                <p style="font-size: 0.8rem; color: #94a3b8;">Identificado como: <br><span id="userIdentidad" style="color:white; font-weight:bold;">Cargando...</span></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Configuración de Bitec Software
        const firebaseConfig = {
            apiKey: "AIzaSyBkkeUy3lWFwRCZp-2gfoEBu5UP2R2vsZk",
            authDomain: "bitecsoftware-web.firebaseapp.com",
            projectId: "bitecsoftware-web",
            storageBucket: "bitecsoftware-web.firebasestorage.app",
            messagingSenderId: "573214894891",
            appId: "1:573214894891:web:646628d1e8eb15478bf36e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        // 1. EL GUARDIA: Solo usuarios registrados
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('userIdentidad').innerText = user.email;
                cargarChat();
            } else {
                // Si no hay sesión iniciada, se le niega el acceso
                window.location.href = "login.html";
            }
        });

        // 2. ENVIAR MENSAJE AL CHAT
        document.getElementById('btnEnviar').onclick = async () => {
            const texto = document.getElementById('txtMensaje').value;
            if (texto.trim() === "") return;

            await addDoc(collection(db, "chats"), {
                usuario: currentUser.email,
                uid: currentUser.uid,
                mensaje: texto,
                fecha: serverTimestamp()
            });
            document.getElementById('txtMensaje').value = "";
        };

        // 3. ENVIAR TICKET DE SOPORTE
        document.getElementById('btnTicket').onclick = async () => {
            const msj = document.getElementById('ticketMsg').value;
            if (msj.trim() === "") return;

            await addDoc(collection(db, "tickets"), {
                usuario: currentUser.email,
                mensaje: msj,
                estado: "pendiente",
                fecha: serverTimestamp()
            });

            alert("Tu ticket ha sido enviado. El equipo de Bitec te responderá pronto.");
            document.getElementById('ticketMsg').value = "";
        };

        // 4. CARGAR CHAT EN TIEMPO REAL
        function cargarChat() {
            const q = query(collection(db, "chats"), orderBy("fecha", "asc"));
            onSnapshot(q, (snapshot) => {
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                snapshot.forEach((doc) => {
                    const d = doc.data();
                    const esMio = d.uid === currentUser.uid;
                    
                    const div = document.createElement('div');
                    div.className = `msg ${esMio ? 'msg-me' : 'msg-other'}`;
                    div.innerHTML = `<span class="u-name">${d.usuario}</span>${d.mensaje}`;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight; // Auto-scroll al final
            });
        }
    </script>
</body>
</html>
