<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitec Software Chile - Inicio</title>
    <style>
        :root { 
            --primary: #38bdf8; 
            --bg: #0f172a; 
            --sidebar: #1e293b; 
            --text: #f8fafc; 
            --accent: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* BARRA LATERAL (SIDEBAR) */
        .sidebar { 
            width: 280px; 
            background: var(--sidebar); 
            border-right: 1px solid #334155; 
            display: flex; 
            flex-direction: column; 
            padding: 30px 20px; 
        }

        .logo-container { text-align: center; margin-bottom: 40px; }
        .logo-text { font-size: 1.4rem; font-weight: bold; color: var(--primary); letter-spacing: 1px; }

        .nav-menu { flex: 1; }

        .nav-link { 
            display: flex; 
            align-items: center; 
            color: #94a3b8; 
            text-decoration: none; 
            padding: 12px 15px; 
            border-radius: 8px; 
            margin-bottom: 8px; 
            transition: 0.3s; 
            font-weight: 500;
        }

        .nav-link:hover { 
            background: #334155; 
            color: white; 
        }

        .nav-link.active { 
            background: var(--primary); 
            color: var(--bg); 
        }

        /* Clases para mostrar/ocultar según sesión */
        .auth-only { display: none; }

        .btn-logout { 
            width: 100%; 
            background: #ef4444; 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn-logout:hover { background: #dc2626; }

        /* CONTENIDO PRINCIPAL */
        .main-content { 
            flex: 1; 
            padding: 60px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
        }

        .hero-img { 
            width: 180px; 
            image-rendering: pixelated; 
            margin-bottom: 20px; 
        }

        h1 { font-size: 2.8rem; margin-bottom: 15px; color: var(--primary); }
        p { font-size: 1.1rem; color: #94a3b8; max-width: 600px; line-height: 1.6; margin-bottom: 30px; }

        .btn-cta { 
            background: var(--accent); 
            color: white; 
            padding: 15px 35px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: bold; 
            transition: 0.3s; 
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
        }

        .btn-cta:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-container">
            <div class="logo-text">BITEC SOFTWARE</div>
        </div>

        <nav class="nav-menu">
            <a href="index.html" class="nav-link active">🏠 Inicio</a>
            
            <a href="login.html" id="linkIngresar" class="nav-link">🔑 Ingresar</a>

            <a href="perfil.html" class="nav-link auth-only">👤 Mi Perfil</a>
            <a href="mensajeria.html" class="nav-link auth-only">💬 Chat Comunitario</a>
            <a href="ticket.html" class="nav-link auth-only">🎟️ Soporte (Tickets)</a>
        </nav>

        <div id="logoutWrapper" class="auth-only">
            <button id="btnCerrarSesion" class="btn-logout">Cerrar Sesión</button>
        </div>
    </div>

    <div class="main-content">
        <img src="https://i.ibb.co/3mnLvwgy/bitecito-mantenimiento.png" alt="Bitecito" class="hero-img">
        <h1>Soluciones Tecnológicas</h1>
        <p>Expertos en desarrollo de software, gestión de bases de datos y restauración de hardware retro en Chile.</p>
        
        <a href="login.html" id="mainActionBtn" class="btn-cta">INGRESAR AL SISTEMA</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBkkeUy3lWFwRCZp-2gfoEBu5UP2R2vsZk",
            authDomain: "bitecsoftware-web.firebaseapp.com",
            projectId: "bitecsoftware-web",
            storageBucket: "bitecsoftware-web.firebasestorage.app",
            messagingSenderId: "573214894891",
            appId: "1:573214894891:web:646628d1e8eb15478bf36e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            const authLinks = document.querySelectorAll('.auth-only');
            const linkIngresar = document.getElementById('linkIngresar');
            const mainActionBtn = document.getElementById('mainActionBtn');

            if (user) {
                // Usuario logeado
                authLinks.forEach(link => link.style.display = 'block');
                linkIngresar.style.display = 'none';
                
                mainActionBtn.innerText = "IR A MI PERFIL";
                mainActionBtn.href = "perfil.html";
            } else {
                // Usuario visitante
                authLinks.forEach(link => link.style.display = 'none');
                linkIngresar.style.display = 'flex';
                
                mainActionBtn.innerText = "INGRESAR AL SISTEMA";
                mainActionBtn.href = "login.html";
            }
        });

        document.getElementById('btnCerrarSesion').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.reload();
            });
        });
    </script>
</body>
</html>
