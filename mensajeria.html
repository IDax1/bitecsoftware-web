<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidad Bitec - Chat</title>
    <style>
        :root { 
            --primary: #38bdf8; 
            --bg: #0f172a; 
            --card: #1e293b; 
            --border: #334155; 
        }

        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        .chat-section { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
        }

        .chat-header { 
            padding: 20px; 
            background: var(--card); 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .chat-header h2 { margin: 0; color: var(--primary); font-size: 1.4rem; }

        .btn-volver {
            background: #334155;
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: bold;
            transition: 0.3s;
            border: 1px solid transparent;
        }
        .btn-volver:hover { background: #475569; border-color: var(--primary); }

        #chat-box { 
            flex: 1; 
            overflow-y: auto; 
            padding: 25px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            background: #0b1120; 
        }
        
        .msg { 
            padding: 12px 16px; 
            border-radius: 15px; 
            max-width: 65%; 
            font-size: 0.95rem; 
            line-height: 1.4;
            position: relative;
            word-wrap: break-word;
        }

        .msg-other { 
            background: var(--card); 
            align-self: flex-start; 
            border-bottom-left-radius: 2px; 
            border: 1px solid var(--border);
        }

        .msg-me { 
            background: var(--primary); 
            color: #0f172a; 
            align-self: flex-end; 
            border-bottom-right-radius: 2px; 
            font-weight: 500;
        }

        .u-name { 
            font-size: 0.75rem; 
            display: block; 
            margin-bottom: 4px; 
            font-weight: bold;
            opacity: 0.8;
        }

        .msg-me .u-name { color: #0f172a; opacity: 0.6; }

        .input-area { 
            padding: 20px; 
            background: var(--card); 
            display: flex; 
            gap: 12px; 
            border-top: 1px solid var(--border); 
            align-items: center;
        }

        input { 
            flex: 1; 
            background: #0f172a; 
            border: 1px solid var(--border); 
            color: white; 
            padding: 14px; 
            border-radius: 10px; 
            outline: none; 
            font-size: 1rem;
        }

        button { 
            background: var(--primary); 
            color: #0f172a; 
            border: none; 
            padding: 14px 25px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s;
        }
        button:hover { transform: scale(1.05); }

        #chat-box::-webkit-scrollbar { width: 6px; }
        #chat-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="chat-section">
        <div class="chat-header">
            <h2>💬 Chat Comunitario Bitec</h2>
            <a href="index.html" class="btn-volver">🏠 Volver</a>
        </div>

        <div id="chat-box"></div>

        <div class="input-area">
            <input type="text" id="txtMensaje" placeholder="Escribe un mensaje..." autocomplete="off">
            <button id="btnEnviar">ENVIAR</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBkkeUy3lWFwRCZp-2gfoEBu5UP2R2vsZk",
            authDomain: "bitecsoftware-web.firebaseapp.com",
            projectId: "bitecsoftware-web",
            storageBucket: "bitecsoftware-web.firebasestorage.app",
            messagingSenderId: "573214894891",
            appId: "1:573214894891:web:646628d1e8eb15478bf36e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let currentUser = null;
        let displayName = "";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                // Obtener el nombre desde la colección 'usuarios'
                const userRef = doc(db, "usuarios", user.uid);
                const userSnap = await getDoc(userRef);
                
                if (userSnap.exists() && userSnap.data().nombre) {
                    displayName = userSnap.data().nombre;
                } else {
                    displayName = user.email.split('@')[0];
                }
                cargarChat();
            } else {
                window.location.href = "login.html";
            }
        });

        async function enviarMensaje() {
            const input = document.getElementById('txtMensaje');
            const texto = input.value.trim();
            if (!texto) return;

            await addDoc(collection(db, "chats"), {
                usuario: displayName,
                uid: currentUser.uid,
                mensaje: texto,
                fecha: serverTimestamp()
            });
            input.value = "";
        }

        document.getElementById('btnEnviar').onclick = enviarMensaje;
        document.getElementById('txtMensaje').onkeypress = (e) => { if(e.key === 'Enter') enviarMensaje(); };

        function cargarChat() {
            const q = query(collection(db, "chats"), orderBy("fecha", "asc"));
            onSnapshot(q, (snapshot) => {
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                snapshot.forEach((doc) => {
                    const d = doc.data();
                    const esMio = d.uid === currentUser.uid;
                    const div = document.createElement('div');
                    div.className = `msg ${esMio ? 'msg-me' : 'msg-other'}`;
                    div.innerHTML = `<span class="u-name">${d.usuario}</span>${d.mensaje}`;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
        }
    </script>
</body>
</html>
