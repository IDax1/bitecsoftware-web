<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Bitec Software</title>
    <style>
        /* Estilo profesional Dark Tech */
        body { 
            background: #0f172a; 
            color: #f1f5f9; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        .card { 
            background: #1e293b; 
            padding: 2.5rem; 
            border-radius: 16px; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5); 
            width: 100%;
            max-width: 400px; 
            text-align: center;
            border: 1px solid #334155;
        }

        h2 { 
            color: #38bdf8; 
            margin: 0 0 0.5rem 0;
            font-size: 2rem;
            letter-spacing: -1px;
        }

        p { color: #94a3b8; margin-bottom: 2rem; }

        .input-group { text-align: left; margin-bottom: 15px; }

        label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: #38bdf8; }

        input { 
            width: 100%; 
            padding: 12px; 
            border-radius: 8px; 
            border: 2px solid #334155; 
            background: #0f172a; 
            color: white; 
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus { border-color: #38bdf8; }

        button { 
            width: 100%; 
            padding: 14px; 
            background: #38bdf8; 
            border: none; 
            border-radius: 8px; 
            color: #0f172a; 
            font-weight: bold; 
            font-size: 1rem;
            cursor: pointer; 
            transition: all 0.3s; 
            margin-top: 1rem;
        }

        button:hover { 
            background: #7dd3fc;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
        }

        .link { 
            font-size: 0.9rem; 
            color: #94a3b8; 
            margin-top: 20px; 
            display: block; 
            text-decoration: none; 
        }

        .link:hover { color: #38bdf8; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Bitec Software</h2>
        <p>Registro de nuevo usuario</p>
        
        <div class="input-group">
            <label>Correo Electrónico</label>
            <input type="email" id="email" placeholder="correo@ejemplo.com">
        </div>

        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="Mínimo 6 caracteres">
        </div>

        <button id="btnRegistrar">CREAR CUENTA</button>
        
        <a href="login.html" class="link">¿Ya tienes cuenta? Inicia sesión</a>
    </div>

    <script type="module">
        // Importación de librerías desde el CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Tus credenciales de Bitec Software
        const firebaseConfig = {
            apiKey: "AIzaSyBkkeUy3lWFwRCZp-2gfoEBu5UP2R2vsZk",
            authDomain: "bitecsoftware-web.firebaseapp.com",
            projectId: "bitecsoftware-web",
            storageBucket: "bitecsoftware-web.firebasestorage.app",
            messagingSenderId: "573214894891",
            appId: "1:573214894891:web:646628d1e8eb15478bf36e"
        };

        // Inicialización
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('btnRegistrar').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            if(pass.length < 6) {
                alert("La contraseña debe ser de al menos 6 caracteres.");
                return;
            }

            try {
                // 1. Crear usuario en el sistema de autenticación
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                // 2. Crear documento en la base de datos con el rango
                await setDoc(doc(db, "usuarios", user.uid), {
                    correo: email,
                    rango: "usuario", // Todos empiezan como usuario
                    fechaRegistro: new Date().toLocaleDateString()
                });

                alert("¡Usuario registrado con éxito en Bitec!");
                window.location.href = "login.html";

            } catch (error) {
                alert("Error al registrar: " + error.message);
            }
        });
    </script>
</body>
</html>
