<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Bitec Software</title>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --border: #334155; --accent: #f59e0b; --danger: #ef4444; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid var(--border); background: var(--card); }
        .nav-tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--border); padding: 0 20px; }
        .tab-btn { background: none; border: none; color: #94a3b8; padding: 15px 25px; cursor: pointer; font-weight: bold; border-bottom: 3px solid transparent; transition: 0.3s; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
        
        .ticket-count { background: var(--danger); color: white; padding: 2px 6px; border-radius: 50%; font-size: 0.7rem; margin-left: 5px; }

        .content { padding: 30px; }
        .section { display: none; }
        .section.active { display: block; }

        .card-table { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #334155; padding: 15px; color: var(--primary); }
        td { padding: 15px; border-bottom: 1px solid var(--border); }
        
        .ticket-card { background: #161b22; border: 1px solid var(--border); padding: 20px; border-radius: 10px; margin-bottom: 15px; position: relative; }
        .ticket-header { display: flex; justify-content: space-between; margin-bottom: 10px; padding-right: 40px; }
        
        .status-pendiente { color: #f59e0b; font-weight: bold; }
        .status-respondido { color: #22c55e; font-weight: bold; }
        
        textarea { width: 100%; background: #0f172a; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; margin-top: 10px; resize: none; box-sizing: border-box; }
        
        .btn-action { background: var(--primary); color: #0f172a; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-delete { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; position: absolute; top: 20px; right: 20px; }
        .btn-volver { background: #475569; color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; }

        select { background: #0f172a; color: white; border: 1px solid var(--border); padding: 5px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>⚙️ Panel Administrativo</h1>
        <a href="index.html" class="btn-volver">VOLVER AL SITIO</a>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('usuarios')">USUARIOS</button>
        <button class="tab-btn" onclick="switchTab('tickets')">
            TICKETS <span id="tab-count" class="ticket-count" style="display:none">0</span>
        </button>
    </div>

    <div class="content">
        <div id="sec-usuarios" class="section active">
            <div class="card-table">
                <table>
                    <thead>
                        <tr>
                            <th>USUARIO</th>
                            <th>CORREO</th>
                            <th>RANGO</th>
                            <th>ACCIONES</th>
                        </tr>
                    </thead>
                    <tbody id="listaUsuarios"></tbody>
                </table>
            </div>
        </div>

        <div id="sec-tickets" class="section">
            <h2 id="ticket-header-title">Gestión de Tickets (0)</h2>
            <div id="listaTickets"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, deleteDoc, query, orderBy, onSnapshot, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBkkeUy3lWFwRCZp-2gfoEBu5UP2R2vsZk",
            authDomain: "bitecsoftware-web.firebaseapp.com",
            projectId: "bitecsoftware-web",
            storageBucket: "bitecsoftware-web.firebasestorage.app",
            messagingSenderId: "573214894891",
            appId: "1:573214894891:web:646628d1e8eb15478bf36e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "usuarios", user.uid));
                if (userDoc.exists() && userDoc.data().rango === "admin") {
                    cargarUsuarios();
                    escucharTickets();
                } else {
                    window.location.href = "index.html";
                }
            } else {
                window.location.href = "login.html";
            }
        });

        async function cargarUsuarios() {
            const querySnapshot = await getDocs(collection(db, "usuarios"));
            const tbody = document.getElementById('listaUsuarios');
            tbody.innerHTML = "";
            querySnapshot.forEach((uDoc) => {
                const u = uDoc.data();
                const id = uDoc.id;
                const fila = document.createElement('tr');
                fila.innerHTML = `
                    <td>${u.nombre || 'Sin nombre'}</td>
                    <td>${u.correo}</td>
                    <td>${u.rango}</td>
                    <td>
                        <select onchange="window.cambiarRango('${id}', this.value)">
                            <option value="">Cambiar...</option>
                            <option value="usuario">Usuario</option>
                            <option value="admin">Admin</option>
                        </select>
                    </td>
                `;
                tbody.appendChild(fila);
            });
        }

        // Escuchar Tickets en tiempo real y contar pendientes
        function escucharTickets() {
            const q = query(collection(db, "tickets"), orderBy("fecha", "desc"));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('listaTickets');
                container.innerHTML = "";
                
                let pendientes = 0;
                let total = snapshot.size;

                snapshot.forEach((tDoc) => {
                    const t = tDoc.data();
                    const id = tDoc.id;
                    if (t.estado === 'pendiente') pendientes++;

                    const card = document.createElement('div');
                    card.className = "ticket-card";
                    card.innerHTML = `
                        <button class="btn-delete" onclick="window.eliminarTicket('${id}')">BORRAR</button>
                        <div class="ticket-header">
                            <span><strong>Usuario:</strong> ${t.usuario}</span>
                            <span class="${t.estado === 'pendiente' ? 'status-pendiente' : 'status-respondido'}">${t.estado.toUpperCase()}</span>
                        </div>
                        <p style="background:#0f172a; padding:10px; border-radius:5px;">${t.mensaje}</p>
                        ${t.respuesta ? `<p style="color:#22c55e;"><strong>Respuesta:</strong> ${t.respuesta}</p>` : ''}
                        ${t.estado === 'pendiente' ? `
                            <textarea id="resp-${id}" placeholder="Escribir respuesta..."></textarea>
                            <button class="btn-action" onclick="window.responderTicket('${id}')">RESPONDER</button>
                        ` : ''}
                    `;
                    container.appendChild(card);
                });

                // Actualizar contadores
                const badge = document.getElementById('tab-count');
                if (pendientes > 0) {
                    badge.innerText = pendientes;
                    badge.style.display = "inline-block";
                } else {
                    badge.style.display = "none";
                }
                document.getElementById('ticket-header-title').innerText = `Gestión de Tickets (${total})`;
            });
        }

        // FUNCIONES GLOBALES
        window.switchTab = (target) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`sec-${target}`).classList.add('active');
            event.target.classList.add('active');
        };

        window.cambiarRango = async (uid, nuevoRango) => {
            if (!nuevoRango) return;
            await updateDoc(doc(db, "usuarios", uid), { rango: nuevoRango });
            alert("Rango actualizado.");
            cargarUsuarios();
        };

        window.responderTicket = async (id) => {
            const texto = document.getElementById(`resp-${id}`).value;
            if (!texto.trim()) return;
            await updateDoc(doc(db, "tickets", id), {
                respuesta: texto,
                estado: "respondido"
            });
        };

        window.eliminarTicket = async (id) => {
            if (confirm("¿Seguro que quieres eliminar este ticket permanentemente?")) {
                await deleteDoc(doc(db, "tickets", id));
            }
        };

    </script>
</body>
</html>
