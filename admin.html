<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Bitec Software</title>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --border: #334155; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        /* Header y Navegación */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid var(--border); background: var(--card); }
        .nav-tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--border); padding: 0 20px; }
        .tab-btn { background: none; border: none; color: #94a3b8; padding: 15px 25px; cursor: pointer; font-weight: bold; border-bottom: 3px solid transparent; transition: 0.3s; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
        .tab-btn:hover { background: #334155; }

        /* Contenedores */
        .content { padding: 30px; }
        .section { display: none; }
        .section.active { display: block; }
        
        .tabla-container { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #334155; color: var(--primary); padding: 15px; font-size: 0.9rem; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 0.95rem; }

        /* Estilos de Tickets */
        .ticket-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 15px; }
        .ticket-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .ticket-user { color: var(--primary); font-weight: bold; }
        .status-badge { padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        .status-pendiente { background: #f59e0b; color: #451a03; }
        .status-respondido { background: #22c55e; color: #064e3b; }
        
        textarea { width: 100%; background: #0f172a; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; margin-top: 10px; box-sizing: border-box; }
        .btn-responder { background: var(--primary); color: var(--bg); border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        .badge-admin { background: #22c55e; color: #064e3b; }
        .badge-user { background: var(--primary); color: #0c4a6e; }
        
        .btn-volver { background: #475569; color: white; padding: 8px 15px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 0.8rem; }
        #loading { text-align: center; padding: 50px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0; color:var(--primary);">Bitec Admin Panel</h1>
        <a href="perfil.html" class="btn-volver">← VOLVER AL PERFIL</a>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('usuarios')">GESTIONAR USUARIOS</button>
        <button class="tab-btn" onclick="switchTab('tickets')">ATENDER TICKETS</button>
    </div>

    <div id="loading">Verificando seguridad...</div>

    <div class="content" id="adminContent" style="display:none;">
        
        <div id="sec-usuarios" class="section active">
            <div class="tabla-container">
                <table>
                    <thead>
                        <tr>
                            <th>Email</th>
                            <th>Registro</th>
                            <th>Rango</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="listaUsuarios"></tbody>
                </table>
            </div>
        </div>

        <div id="sec-tickets" class="section">
            <div id="lista-tickets-container">
                </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, getDocs, updateDoc, deleteDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBkkeUy3lWFwRCZp-2gfoEBu5UP2R2vsZk",
            authDomain: "bitecsoftware-web.firebaseapp.com",
            projectId: "bitecsoftware-web",
            storageBucket: "bitecsoftware-web.firebasestorage.app",
            messagingSenderId: "573214894891",
            appId: "1:573214894891:web:646628d1e8eb15478bf36e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 1. EL GUARDIA: Verificar Admin
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docRef = doc(db, "usuarios", user.uid);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists() && docSnap.data().rango === "admin") {
                    document.getElementById('loading').style.display = "none";
                    document.getElementById('adminContent').style.display = "block";
                    cargarUsuarios();
                    cargarTickets();
                } else {
                    alert("Acceso Prohibido.");
                    window.location.href = "perfil.html";
                }
            } else {
                window.location.href = "login.html";
            }
        });

        // 2. FUNCIÓN CARGAR USUARIOS
        async function cargarUsuarios() {
            const querySnapshot = await getDocs(collection(db, "usuarios"));
            const tbody = document.getElementById('listaUsuarios');
            tbody.innerHTML = "";
            querySnapshot.forEach((uDoc) => {
                const u = uDoc.data();
                const id = uDoc.id;
                const fila = document.createElement('tr');
                fila.innerHTML = `
                    <td>${u.correo}</td>
                    <td>${u.fechaRegistro || 'S/N'}</td>
                    <td><span class="badge ${u.rango === 'admin' ? 'badge-admin' : 'badge-user'}">${u.rango}</span></td>
                    <td>
                        <select onchange="cambiarRango('${id}', this.value)">
                            <option value="">Cambiar...</option>
                            <option value="usuario">Hacer Usuario</option>
                            <option value="admin">Hacer Admin</option>
                        </select>
                    </td>
                `;
                tbody.appendChild(fila);
            });
        }

        // 3. FUNCIÓN CARGAR TICKETS (Tiempo Real)
        function cargarTickets() {
            const q = query(collection(db, "tickets"), orderBy("fecha", "desc"));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('lista-tickets-container');
                container.innerHTML = "";
                snapshot.forEach((tDoc) => {
                    const t = tDoc.data();
                    const id = tDoc.id;
                    const card = document.createElement('div');
                    card.className = "ticket-card";
                    card.innerHTML = `
                        <div class="ticket-header">
                            <span class="ticket-user">${t.usuario}</span>
                            <span class="status-badge ${t.estado === 'pendiente' ? 'status-pendiente' : 'status-respondido'}">${t.estado.toUpperCase()}</span>
                        </div>
                        <p style="margin: 10px 0;">${t.mensaje}</p>
                        ${t.respuesta ? `<p style="color:#38bdf8; font-size:0.9rem;"><b>Respuesta:</b> ${t.respuesta}</p>` : ''}
                        ${t.estado === 'pendiente' ? `
                            <textarea id="resp-${id}" placeholder="Escribe tu respuesta técnica..."></textarea>
                            <button class="btn-responder" onclick="responderTicket('${id}')">Enviar Respuesta</button>
                        ` : ''}
                    `;
                    container.appendChild(card);
                });
            });
        }

        // FUNCIONES GLOBALES
        window.switchTab = (target) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`sec-${target}`).classList.add('active');
            event.target.classList.add('active');
        };

        window.cambiarRango = async (uid, nuevoRango) => {
            if (!nuevoRango) return;
            await updateDoc(doc(db, "usuarios", uid), { rango: nuevoRango });
            alert("Rango actualizado.");
            cargarUsuarios();
        };

        window.responderTicket = async (id) => {
            const texto = document.getElementById(`resp-${id}`).value;
            if (!texto) return;
            await updateDoc(doc(db, "tickets", id), {
                respuesta: texto,
                estado: "respondido"
            });
            alert("Ticket respondido correctamente.");
        };
    </script>
</body>
</html>
