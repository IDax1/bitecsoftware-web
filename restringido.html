<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitec Software - Registro Restringido</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #161b22;
            --primary-blue: #007bff;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --accent-glow: rgba(0, 123, 255, 0.2);
            --border-color: #30363d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary-blue);
            filter: blur(150px);
            opacity: 0.1;
            top: 10%;
            left: 10%;
            z-index: -1;
        }

        .container {
            text-align: center;
            padding: 2.5rem;
            max-width: 500px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease-out;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 1.5rem;
        }

        .logo span {
            color: var(--primary-blue);
        }

        .icon-box {
            margin-bottom: 1.5rem;
        }

        .icon-box svg {
            width: 64px;
            height: 64px;
            fill: var(--primary-blue);
            filter: drop-shadow(0 0 8px var(--accent-glow));
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        p {
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: inline-block;
            padding: 0.8rem 2rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-admin {
            background: var(--primary-blue);
            color: white;
            border: 1px solid var(--primary-blue);
        }

        .btn-admin:hover {
            background: #1a88ff;
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--text-dim);
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #484f58;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">BITEC<span>SOFTWARE</span></div>
        
        <div class="icon-box">
            <svg viewBox="0 0 24 24">
                <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.47 4.34-2.85 8.13-7 9.19V12H5V6.3l7-3.11v8.8z"/>
            </svg>
        </div>

        <h1>Acceso Restringido</h1>
        <p>
            Aún no tenemos habilitado el registro para usuarios normales. 
            Esta sección es de uso exclusivo para <strong>administradores</strong>.
        </p>

        <div class="button-group">
            <a href="login.html" class="btn btn-admin">Acceso Administrador</a>
            <a href="index.html" class="btn btn-outline">Volver al Inicio</a>
        </div>

        <div class="footer-note">
            &copy; 2026 Bitec Software Chile.
        </div>
    </div>

</body>
</html>
