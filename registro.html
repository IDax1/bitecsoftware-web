<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Bitec Software</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; width: 300px; gap: 10px; margin: 50px; }
        input, button { padding: 10px; }
    </style>
</head>
<body>

    <h3>Crear Cuenta en Bitec</h3>
    <input type="email" id="email" placeholder="Correo electrónico">
    <input type="password" id="password" placeholder="Contraseña">
    <button id="btnRegistrar">Registrarme</button>

    <script type="module">
        // Importamos Firebase desde la web directamente
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // TUS CREDENCIALES (Copiadas de tu imagen)
        const firebaseConfig = {
            apiKey: "AIzaSyBkkeUy3lWFwRCZp-2gfoEBu5UP2R2vsZk",
            authDomain: "bitecsoftware-web.firebaseapp.com",
            projectId: "bitecsoftware-web",
            storageBucket: "bitecsoftware-web.firebasestorage.app",
            messagingSenderId: "573214894891",
            appId: "1:573214894891:web:646628d1e8eb15478bf36e",
            measurementId: "G-2EW80575TR"
        };

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Función del botón
        document.getElementById('btnRegistrar').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            createUserWithEmailAndPassword(auth, email, pass)
                .then((userCredential) => {
                    alert("¡Usuario registrado con éxito!");
                    console.log("Registrado:", userCredential.user);
                })
                .catch((error) => {
                    alert("Error: " + error.message);
                });
        });
    </script>
</body>
</html>
